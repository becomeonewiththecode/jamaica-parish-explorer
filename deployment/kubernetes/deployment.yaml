apiVersion: apps/v1
kind: Deployment
metadata:
  name: jamaica-parish-explorer
  labels:
    app: jamaica-parish-explorer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jamaica-parish-explorer
  template:
    metadata:
      labels:
        app: jamaica-parish-explorer
    spec:
      containers:
        - name: app
          image: ghcr.io/your-username/jamaica-parish-explorer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: HOST
              value: "0.0.0.0"
            # Store SQLite DB + caches on the persistent volume (see volumeMounts below)
            - name: JAMAICA_DATA_DIR
              value: "/data"
            # Flight/vessel backend APIs
            - name: RAPIDAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: RAPIDAPI_KEY
            - name: OPENSKY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: OPENSKY_CLIENT_ID
            - name: OPENSKY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: OPENSKY_CLIENT_SECRET
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: AISSTREAM_API_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: jamaica-data-pvc

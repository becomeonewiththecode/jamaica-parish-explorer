apiVersion: apps/v1
kind: Deployment
metadata:
  name: jamaica-parish-explorer
  labels:
    app: jamaica-parish-explorer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jamaica-parish-explorer
  template:
    metadata:
      labels:
        app: jamaica-parish-explorer
    spec:
      containers:
        - name: app
          image: ghcr.io/your-username/jamaica-parish-explorer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: HOST
              value: "0.0.0.0"
            # Flight/vessel backend APIs
            - name: RAPIDAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: RAPIDAPI_KEY
            - name: OPENSKY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: OPENSKY_CLIENT_ID
            - name: OPENSKY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: OPENSKY_CLIENT_SECRET
            - name: AISSTREAM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: jamaica-secrets
                  key: AISSTREAM_API_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"


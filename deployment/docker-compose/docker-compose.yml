version: "3.9"

services:
  jamaica-parish-explorer:
    build:
      context: ../..
      dockerfile: deployment/docker-compose/Dockerfile
    container_name: jamaica-parish-explorer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      - HOST=0.0.0.0
      - STATUS_HOST=0.0.0.0
      - STATUS_PORT=5555
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=5556
    ports:
      # API server
      - "${HOST_PORT:-80}:${PORT:-3001}"
      # Status board
      - "${STATUS_PORT:-5555}:5555"
      # Admin dashboard
      - "${ADMIN_PORT:-5556}:5556"
    volumes:
      # Persist SQLite database and cache files
      - jamaica_data:/app/server
    working_dir: /app

volumes:
  jamaica_data:


version: "3.9"

services:
  jamaica-parish-explorer:
    build:
      context: ../..
      dockerfile: deployment/option3-docker-compose/Dockerfile
    container_name: jamaica-parish-explorer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Fallbacks if not set in .env
      - NODE_ENV=production
      - PORT=${PORT:-3000}
    ports:
      # Change "80:3000" if you want a different external port
      - "${HOST_PORT:-80}:${PORT:-3000}"
    volumes:
      # Persist SQLite database and any generated files
      - jamaica_data:/app/data
    working_dir: /app
    command: ["npm", "start"]

volumes:
  jamaica_data:


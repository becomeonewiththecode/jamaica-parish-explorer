<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jamaica Parish Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a1628;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* TOP SECTION - MAP */
    #map-section {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px 20px;
      background: linear-gradient(180deg, #0d1f3c 0%, #122a4f 100%);
      min-height: 55vh;
    }

    #map-section h1 {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #f0c040;
      margin-bottom: 10px;
    }

    #map-section .subtitle {
      font-size: 0.85rem;
      color: #7a9cc6;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    #map-container {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    #jamaica-map {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }

    #jamaica-map .parish {
      stroke: #1a3a5c;
      stroke-width: 1.2;
      cursor: pointer;
      transition: fill 0.3s ease, stroke 0.3s ease, filter 0.3s ease;
    }

    #jamaica-map .parish:hover {
      stroke: #f0c040;
      stroke-width: 2;
      filter: brightness(1.3) drop-shadow(0 0 8px rgba(240, 192, 64, 0.4));
    }

    #jamaica-map .parish.active {
      stroke: #f0c040;
      stroke-width: 2.5;
      filter: brightness(1.4) drop-shadow(0 0 12px rgba(240, 192, 64, 0.6));
    }

    #parish-tooltip {
      position: absolute;
      background: rgba(10, 22, 40, 0.95);
      border: 1px solid #f0c040;
      color: #f0c040;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
      font-weight: 600;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 10;
      white-space: nowrap;
    }

    /* BOTTOM SECTION - INFO */
    #info-section {
      min-height: 45vh;
      background: linear-gradient(180deg, #122a4f 0%, #0d1f3c 100%);
      padding: 40px 20px 60px;
      display: flex;
      justify-content: center;
    }

    #info-content {
      max-width: 900px;
      width: 100%;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #info-content.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    #info-content.fade-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Default state */
    #info-placeholder {
      text-align: center;
      padding: 60px 20px;
    }

    #info-placeholder .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    #info-placeholder h2 {
      font-size: 1.4rem;
      font-weight: 300;
      color: #7a9cc6;
      margin-bottom: 8px;
    }

    #info-placeholder p {
      color: #4a6d94;
      font-size: 0.9rem;
    }

    /* Parish detail view */
    #parish-detail { display: none; }

    #parish-detail .parish-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1e3a5f;
    }

    #parish-detail .parish-header h2 {
      font-size: 2rem;
      font-weight: 600;
      color: #f0c040;
    }

    #parish-detail .parish-header .county {
      font-size: 0.85rem;
      color: #7a9cc6;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 16px;
    }

    .stat-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a8ab5;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 1.15rem;
      font-weight: 600;
      color: #e8e8e8;
    }

    .description {
      line-height: 1.7;
      color: #b0c4de;
      font-size: 0.95rem;
    }

    .description p { margin-bottom: 14px; }

    .notable-features {
      margin-top: 20px;
    }

    .notable-features h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a8ab5;
      margin-bottom: 12px;
    }

    .features-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .feature-tag {
      background: rgba(240, 192, 64, 0.1);
      border: 1px solid rgba(240, 192, 64, 0.25);
      color: #f0c040;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      #map-section { min-height: 40vh; padding: 20px 10px; }
      #map-section h1 { font-size: 1.3rem; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      #parish-detail .parish-header h2 { font-size: 1.5rem; }
    }
  </style>
</head>

// Map interaction
const tooltip = document.getElementById('parish-tooltip');
const mapContainer = document.getElementById('map-container');
const infoContent = document.getElementById('info-content');
const placeholder = document.getElementById('info-placeholder');
const detail = document.getElementById('parish-detail');
let activeParish = null;

document.querySelectorAll('.parish').forEach(path => {
  path.addEventListener('mouseenter', (e) => {
    const id = path.id;
    const data = parishData[id];
    if (data) {
      tooltip.textContent = data.name;
      tooltip.style.opacity = '1';
    }
  });

  path.addEventListener('mousemove', (e) => {
    const rect = mapContainer.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 35) + 'px';
  });

  path.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
  });

  path.addEventListener('click', () => {
    const id = path.id;
    if (activeParish === id) return;

    // Update active state
    document.querySelectorAll('.parish').forEach(p => p.classList.remove('active'));
    path.classList.add('active');
    activeParish = id;

    // Fade out, update, fade in
    infoContent.classList.remove('fade-in');
    infoContent.classList.add('fade-out');

    setTimeout(() => {
      showParishDetail(id);
      infoContent.classList.remove('fade-out');
      infoContent.classList.add('fade-in');
    }, 400);
  });
});

function showParishDetail(id) {
  const data = parishData[id];
  if (!data) return;

  placeholder.style.display = 'none';
  detail.style.display = 'block';

  document.getElementById('detail-name').textContent = data.name;
  document.getElementById('detail-county').textContent = data.county;
  document.getElementById('detail-population').textContent = data.population;
  document.getElementById('detail-capital').textContent = data.capital;
  document.getElementById('detail-area').textContent = data.area;
  document.getElementById('detail-county-card').textContent = data.county.replace('County of ', '');
  document.getElementById('detail-description').innerHTML = data.description;

  const featuresContainer = document.getElementById('detail-features');
  featuresContainer.innerHTML = data.features
    .map(f => `<span class="feature-tag">${f}</span>`)
    .join('');
}
</script>
</body>
</html>
